{% extends 'base.html' %}
{% block title %}Create Account - The Market Wala{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-24 pb-16">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{{ url_for('main.home') }}" class="inline-flex items-center gap-2 mb-6">
                <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center">
                    <span class="text-white font-bold text-lg font-space">M</span>
                </div>
            </a>
            <h1 class="text-2xl font-space font-bold text-slate-900">Create Account</h1>
            <p class="text-slate-500 mt-2">Start your trading education journey</p>
        </div>
        <div class="card p-8">
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="Min 8 characters">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Confirm Password</label>
                    <input type="password" name="confirm_password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-primary w-full">Create Account</button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-emerald-600 hover:text-emerald-700 font-medium">Sign in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
