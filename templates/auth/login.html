{% extends 'base.html' %}
{% block title %}Sign In - The Market Wala{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-24 pb-16">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{{ url_for('main.home') }}" class="inline-flex items-center gap-2 mb-6">
                <div class="w-10 h-10 rounded-xl gradient-bg flex items-center justify-center">
                    <span class="text-white font-bold text-lg font-space">M</span>
                </div>
            </a>
            <h1 class="text-2xl font-space font-bold text-slate-900">Welcome Back</h1>
            <p class="text-slate-500 mt-2">Sign in to continue your learning journey</p>
        </div>
        <div class="card p-8">
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="you@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                    <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="••••••••">
                </div>
                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 text-sm text-slate-600">
                        <input type="checkbox" name="remember" class="rounded border-slate-300 text-emerald-500 focus:ring-emerald-500">
                        Remember me
                    </label>
                    <a href="{{ url_for('auth.forgot_password') }}" class="text-sm text-emerald-600 hover:text-emerald-700 font-medium">Forgot password?</a>
                </div>
                <button type="submit" class="btn-primary w-full">Sign In</button>
            </form>
            <div class="mt-6 text-center">
                <p class="text-sm text-slate-500">Don't have an account? <a href="{{ url_for('auth.register') }}" class="text-emerald-600 hover:text-emerald-700 font-medium">Create one</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
