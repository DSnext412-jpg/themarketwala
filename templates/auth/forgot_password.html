{% extends 'base.html' %}
{% block title %}Forgot Password - The Market Wala{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 pt-24 pb-16">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-space font-bold text-slate-900">Forgot Password</h1>
            <p class="text-slate-500 mt-2">Enter your email and we'll send you a reset link</p>
        </div>
        <div class="card p-8">
            <form method="POST" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
                    <input type="email" name="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="you@example.com">
                </div>
                <button type="submit" class="btn-primary w-full">Send Reset Link</button>
            </form>
            <div class="mt-6 text-center">
                <a href="{{ url_for('auth.login') }}" class="text-sm text-emerald-600 hover:text-emerald-700 font-medium">Back to Sign In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
