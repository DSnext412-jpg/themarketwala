{% extends 'admin/base.html' %}
{% block title %}Settings - The Market Wala{% endblock %}

{% block admin_content %}
<div class="max-w-3xl mx-auto space-y-6">
    <div>
        <h1 class="text-2xl font-space font-bold text-slate-900">Platform Settings</h1>
        <p class="text-slate-500">Manage platform configuration</p>
    </div>

    <form method="POST" class="card p-6 space-y-6">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <p class="text-sm text-slate-500">Settings storage coming soon. Currently in placeholder mode.</p>
        <div class="flex items-center gap-4 pt-2">
            <button type="submit" class="btn-primary text-sm">Save Settings</button>
            <a href="{{ url_for('admin.export_data') }}" class="btn-outline text-sm inline-flex items-center gap-2 no-underline">
                <i data-lucide="download" class="w-4 h-4"></i> Export JSON
            </a>
        </div>
    </form>
</div>
{% endblock %}
