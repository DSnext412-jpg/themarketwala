{% extends 'base.html' %}
{% block content %}
<div class="pt-16 min-h-screen bg-slate-50">
    <div class="flex">
        <aside class="hidden lg:block w-64 min-h-screen bg-white border-r border-slate-100 fixed left-0 top-16 p-4 overflow-y-auto">
            <div class="text-center mb-6 pt-4">
                <div class="w-16 h-16 rounded-2xl gradient-bg flex items-center justify-center mx-auto mb-3">
                    <span class="text-2xl font-bold text-white font-space">{{ current_user.name[0]|upper }}</span>
                </div>
                <h3 class="font-semibold text-slate-900">{{ current_user.name }}</h3>
                <span class="badge bg-amber-100 text-amber-700 text-xs mt-1">Platform Owner</span>
            </div>
            <nav class="space-y-1">
                <a href="{{ url_for('admin.overview') }}" class="sidebar-link {% if request.endpoint == 'admin.overview' %}active{% endif %}">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Overview
                </a>
                <a href="{{ url_for('admin.users') }}" class="sidebar-link {% if request.endpoint == 'admin.users' %}active{% endif %}">
                    <i data-lucide="users" class="w-5 h-5"></i> Users
                </a>
                <a href="{{ url_for('admin.courses') }}" class="sidebar-link {% if request.endpoint in ['admin.courses', 'admin.create_course', 'admin.edit_course'] %}active{% endif %}">
                    <i data-lucide="book-open" class="w-5 h-5"></i> Courses
                </a>
                <a href="{{ url_for('admin.blogs') }}" class="sidebar-link {% if request.endpoint in ['admin.blogs', 'admin.create_blog', 'admin.edit_blog'] %}active{% endif %}">
                    <i data-lucide="file-text" class="w-5 h-5"></i> Blogs
                </a>
                <a href="{{ url_for('admin.media') }}" class="sidebar-link {% if request.endpoint == 'admin.media' %}active{% endif %}">
                    <i data-lucide="image" class="w-5 h-5"></i> Media
                </a>
                <a href="{{ url_for('admin.analytics') }}" class="sidebar-link {% if request.endpoint == 'admin.analytics' %}active{% endif %}">
                    <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Analytics
                </a>
                <a href="{{ url_for('admin.settings') }}" class="sidebar-link {% if request.endpoint == 'admin.settings' %}active{% endif %}">
                    <i data-lucide="settings" class="w-5 h-5"></i> Settings
                </a>
                <hr class="my-3 border-slate-100">
                <a href="{{ url_for('main.home') }}" class="sidebar-link">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Site
                </a>
            </nav>
        </aside>

        <div class="flex-1 lg:ml-64">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                {% block admin_content %}{% endblock %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
