{% extends 'student/base.html' %}
{% block title %}Settings - The Market Wala{% endblock %}

{% block dashboard_content %}
<div class="max-w-2xl mx-auto space-y-6">
    <h1 class="text-2xl font-space font-bold text-slate-900">Account Settings</h1>

    <div class="card p-8">
        <h2 class="text-lg font-semibold text-slate-900 mb-6">Change Password</h2>
        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Current Password</label>
                <input type="password" name="current_password" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="Enter current password">
            </div>
            <div class="grid sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">New Password</label>
                    <input type="password" name="new_password" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="Min 8 characters">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900" placeholder="••••••••">
                </div>
            </div>
            <button type="submit" class="btn-primary w-full">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
